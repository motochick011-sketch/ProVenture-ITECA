<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      padding:20px;
    }

    .container{
      background:white;
      border:1px solid #cfcfe8;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
      border-bottom:1px solid #e5e5e5;
    }

    .logo{
      font-size:22px;
      font-weight:bold;
      color:#4b3cff;
    }

    .search-section{
      display:flex;
      gap:10px;
    }

    .search-section select,
    .search-section input{
      padding:8px;
      border:1px solid #ddd;
    }

    .search-section input{
      width:260px;
    }

    .nav a{
      text-decoration:none;
      margin-left:15px;
      color:#333;
      font-size:14px;
    }

    .breadcrumb{
      padding:20px;
      font-size:14px;
      color:#666;
      display:flex;
      align-items:center;
      gap:15px;
    }

    .back-btn{
      background:#4b3cff;
      color:white;
      font-size:13px;
      padding:8px 16px;
    }

    .main{
      display:flex;
      padding:20px;
      gap:30px;
    }

    .image-box{
      width:420px;
      border:1px solid #e2e2e2;
      padding:20px;
      border-radius:4px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .image-box img{
      width:220px;
    }

    .details{
      flex:1;
    }

    .details h1{
      margin-bottom:15px;
      font-size:36px;
    }

    .price{
      font-size:34px;
      font-weight:bold;
      color:#4b3cff;
      margin-bottom:20px;
    }

    .info{
      margin-bottom:15px;
    }

    .info strong{
      display:inline-block;
      width:100px;
    }

    .description{
      margin-top:25px;
      line-height:1.8;
    }

    .buttons{
      margin-top:30px;
      display:flex;
      gap:15px;
    }

    .btn{
      padding:12px 25px;
      border:none;
      cursor:pointer;
      border-radius:4px;
      font-weight:bold;
    }

    .chat{
      background:white;
      border:1px solid #4b3cff;
      color:#4b3cff;
    }

    .cart{
      background:#6a4cff;
      color:white;
    }

  </style>
</head>

<body>

<div class="container">

  <header>

    <div class="logo">Pro-Venture</div>

    <div class="search-section">
      <select>
        <option>All Categories</option>
      </select>

      <input type="text" placeholder="Search for products...">
    </div>

    <div class="nav">
      <a href="#">Sell</a>
      <a href="#" onclick="navigateTo('login_screen')">Login</a>
      <a href="#" onclick="navigateTo('register_screen')">Register</a>
    </div>

  </header>

  <div class="breadcrumb">
    <button class="btn back-btn" onclick="navigateTo('product_listings_screen')">← Back</button>
    Home / Electronics / <strong>iPhone 12 64GB</strong>
  </div>

  <div class="main">

    <div class="image-box">
      <img src="https://via.placeholder.com/220x300" alt="iPhone 12">
    </div>

    <div class="details">

      <h1>iPhone 12 64GB</h1>

      <div class="price">RM1,699.00</div>

      <div class="info">
        <strong>Condition:</strong> Like New
      </div>

      <div class="info">
        <strong>Location:</strong> Kuala Lumpur
      </div>

      <div class="info">
        <strong>Posted by:</strong> John Doe (96% Positive)
      </div>

      <div class="description">
        <strong>Description:</strong><br><br>
        iPhone 12 64GB Blue color. Good condition, rarely used.
      </div>

      <div class="buttons">
        <button class="btn cart" onclick="addToCart()">Add to Cart</button>
      </div>

    </div>

  </div>

</div>

</body>
</html>
