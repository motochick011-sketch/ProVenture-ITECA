<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#ffffff;
      padding:20px;
    }

    .page-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .login-container{
      width:420px;
      min-height:520px;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
    }

    .login-box{
      width:100%;
      background:rgba(255,255,255,0.05);
      padding:30px;
      border-radius:8px;
      backdrop-filter:blur(5px);
    }

    .login-header{
      text-align:center;
      color:white;
      margin-bottom:30px;
    }

    .login-header h2{
      margin-bottom:8px;
      font-size:28px;
    }

    .login-header p{
      color:#cbd5e1;
      font-size:14px;
    }

    .form-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      color:white;
      margin-bottom:8px;
      font-size:14px;
    }

    .input-group{
      position:relative;
    }

    input[type="email"],
    input[type="password"]{
      width:100%;
      padding:12px;
      border:none;
      border-radius:5px;
      background:rgba(255,255,255,0.08);
      color:white;
      outline:none;
    }

    input::placeholder{
      color:#94a3b8;
    }

    .password-icon{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      color:#94a3b8;
      cursor:pointer;
    }

    .remember{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:25px;
      color:#e2e8f0;
      font-size:14px;
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:5px;
      background:#6d4aff;
      color:white;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#5a3cf0;
    }
  </style>
</head>
<body>

<h1 class="page-title">Admin Login</h1>

<div class="login-container">

  <div class="login-box">

    <div class="login-header">
      <h2>Pro-Venture Admin</h2>
      <p>Sign in to continue</p>
    </div>

    <form>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter admin email">
      </div>

      <div class="form-group">
        <label>Password</label>

        <div class="input-group">
          <input type="password" placeholder="Enter password">
          <i class="fa-solid fa-eye password-icon"></i>
        </div>
      </div>

      <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember" style="margin:0;">Remember me</label>
      </div>

      <button type="submit" class="login-btn">
        Login
      </button>

    </form>

  </div>

</div>

</body>
</html>
