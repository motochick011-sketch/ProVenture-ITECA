<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro-venture Cart</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f8f8f8;
      padding:20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
      background:#fff;
      border:2px solid #6c63ff;
      padding:15px;
    }

    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .logo{
      color:#6c63ff;
      font-weight:bold;
    }

    .nav-links a{
      text-decoration:none;
      color:#555;
      margin-left:15px;
      font-size:14px;
    }

    .cart{
      border:1px solid #ddd;
      border-radius:5px;
      overflow:hidden;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      text-align:left;
      padding:15px;
      background:#fafafa;
      color:#555;
      font-size:14px;
    }

    td{
      padding:20px 15px;
      border-top:1px solid #eee;
      vertical-align:middle;
      font-size:14px;
    }

    .product{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .product img{
      width:60px;
      height:60px;
      object-fit:cover;
    }

    .delete{
      color:#e74c3c;
      cursor:pointer;
      font-size:16px;
    }

    .total-section{
      text-align:right;
      padding:25px;
    }

    .total-label{
      font-size:28px;
      font-weight:bold;
      margin-right:20px;
    }

    .total-price{
      font-size:36px;
      font-weight:bold;
    }

    .buttons{
      display:flex;
      justify-content:space-between;
      padding:20px;
    }

    .btn{
      padding:12px 25px;
      border:none;
      border-radius:4px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-secondary{
      background:white;
      color:#333;
      border:1px solid #ccc;
    }

    .btn-primary{
      background:#6c63ff;
      color:white;
    }

    .btn-success{
      background:#27ae60;
      color:white;
      font-size:18px;
      padding:15px 40px;
    }

    .payment-section{
      display:none;
      text-align:center;
      padding:30px;
    }

    .payment-section h3{
      margin-bottom:15px;
      color:#333;
    }

    .payment-section p{
      margin-bottom:20px;
      color:#666;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="navbar">
    <div class="logo">Pro-Venture</div>

    <div class="nav-links">
      <a href="#">Sell</a>
      <a href="#">Login</a>
      <a href="#">Register</a>
    </div>
  </div>

  <div class="cart" id="cartSection">
    <table>
      <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Action</th>
        <th>Subtotal</th>
      </tr>
      </thead>
      <tbody id="cartBody">
        <tr><td colspan="4" style="text-align:center;padding:30px;">Loading...</td></tr>
      </tbody>
    </table>

    <div class="total-section">
      <span class="total-label">Total:</span>
      <span class="total-price" id="cartTotal">R0.00</span>
    </div>

    <div class="buttons">
      <button class="btn btn-secondary" onclick="navigateTo('product_listings_screen')">
        Continue Shopping
      </button>

      <button class="btn btn-primary" id="checkoutBtn" onclick="proceedToCheckout()">
        Proceed to Checkout
      </button>
    </div>
  </div>

  <div class="payment-section" id="paymentSection">
    <h3>Payment</h3>
    <p>Your order has been placed. Please confirm payment below.</p>
    <p id="paymentTotal" style="font-size:24px;font-weight:bold;color:#6c63ff;"></p>
    <button class="btn btn-success" onclick="confirmPayment()">Confirm Payment (Demo)</button>
  </div>

</div>

</body>
</html>
