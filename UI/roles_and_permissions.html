<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roles & Permissions (RBAC)</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f6fa;
      padding:20px;
    }

    .page-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .container{
      display:flex;
      min-height:600px;
      background:#fff;
      border:1px solid #a8abd8;
    }

    /* Sidebar */
    .sidebar{
      width:230px;
      background:linear-gradient(to bottom,#16243a,#0c1625);
      color:#fff;
    }

    .logo{
      padding:20px;
      font-size:18px;
      font-weight:bold;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .sidebar ul{
      list-style:none;
      padding-top:10px;
    }

    .sidebar ul li{
      padding:14px 20px;
      cursor:pointer;
      transition:0.3s;
      font-size:14px;
    }

    .sidebar ul li:hover{
      background:rgba(255,255,255,0.08);
    }

    .sidebar ul li i{
      width:20px;
      margin-right:10px;
    }

    /* Main Content */
    .main-content{
      flex:1;
      padding:25px;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .top-bar h2{
      color:#333;
    }

    .add-btn{
      background:#6c4df6;
      color:#fff;
      border:none;
      padding:10px 18px;
      border-radius:4px;
      font-size:13px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .add-btn:hover{
      background:#5a3fe0;
    }

    /* Table */
    .table-wrapper{
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      text-align:left;
      padding:14px;
      background:#fafafa;
      border-bottom:1px solid #ddd;
      color:#555;
      font-size:14px;
    }

    td{
      padding:16px 14px;
      border-bottom:1px solid #eee;
      color:#444;
      font-size:14px;
    }

    .permission-text{
      color:#555;
    }

    .edit-btn{
      padding:7px 14px;
      border:1px solid #d8d1ff;
      background:#f7f5ff;
      color:#6c4df6;
      border-radius:4px;
      cursor:pointer;
      font-weight:bold;
      font-size:12px;
    }

    .edit-btn:hover{
      background:#ece8ff;
    }
  </style>
</head>
<body>

<h1 class="page-title">Roles & Permissions (RBAC)</h1>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="logo">
      Pro-Venture Admin
    </div>

    <ul>
      <li><i class="fas fa-gauge"></i> Dashboard</li>
      <li><i class="fas fa-users"></i> Users</li>
      <li><i class="fas fa-box"></i> Products</li>
      <li><i class="fas fa-cart-shopping"></i> Orders</li>
      <li><i class="fas fa-tags"></i> Categories</li>
      <li><i class="fas fa-user-shield"></i> Roles & Permissions</li>
      <li><i class="fas fa-chart-bar"></i> Reports</li>
      <li><i class="fas fa-cog"></i> Settings</li>
      <li><i class="fas fa-right-from-bracket"></i> Logout</li>
    </ul>

  </div>

  <!-- Main Content -->
  <div class="main-content">

    <div class="top-bar">
      <h2>Roles</h2>
      <button class="add-btn">Add New Role</button>
    </div>

    <div class="table-wrapper">

      <table>
        <thead>
        <tr>
          <th>Role Name</th>
          <th>Permissions</th>
          <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr>
          <td><strong>Admin</strong></td>
          <td class="permission-text">All Permissions</td>
          <td>
            <button class="edit-btn">Edit</button>
          </td>
        </tr>

        <tr>
          <td><strong>Seller</strong></td>
          <td class="permission-text">
            Manage Own Products, Orders
          </td>
          <td>
            <button class="edit-btn">Edit</button>
          </td>
        </tr>

        <tr>
          <td><strong>Customer</strong></td>
          <td class="permission-text">
            Buy, Sell, Chat
          </td>
          <td>
            <button class="edit-btn">Edit</button>
          </td>
        </tr>
        </tbody>

      </table>

    </div>

  </div>

</div>

</body>
</html>
