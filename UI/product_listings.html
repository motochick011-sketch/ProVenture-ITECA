<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Listing - Pro-Venture</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      padding:20px;
    }

    .container{
      border:1px solid #ccc;
      background:white;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
      border-bottom:1px solid #ddd;
    }

    .logo{
      font-size:22px;
      font-weight:bold;
      color:#3a35ff;
    }

    .search-bar{
      display:flex;
      gap:10px;
    }

    .search-bar input{
      padding:8px;
      width:250px;
      border:1px solid #ccc;
    }

    nav a{
      margin-left:15px;
      text-decoration:none;
      color:#333;
    }

    .main{
      display:flex;
    }

    .sidebar{
      width:220px;
      padding:20px;
      border-right:1px solid #ddd;
    }

    .sidebar h3{
      margin-bottom:15px;
    }

    .sidebar ul{
      list-style:none;
    }

    .sidebar li{
      padding:10px 0;
      cursor:pointer;
    }

    .content{
      flex:1;
      padding:20px;
    }

    .content h2{
      margin-bottom:20px;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
    }

    .card{
      border:1px solid #ddd;
      padding:15px;
      text-align:center;
      border-radius:8px;
      background:white;
    }

    .card img{
      width:100%;
      height:140px;
      object-fit:contain;
    }

    .card h4{
      margin:10px 0;
    }

    .price{
      color:#3a35ff;
      font-weight:bold;
    }

  </style>
</head>

<body>

<div class="container">

  <header>
    <div class="logo">Pro-Venture</div>

    <div class="search-bar">
      <select>
        <option>All Categories</option>
      </select>

      <input type="text" placeholder="Search for products...">
    </div>

    <nav>
      <a href="#">Sell</a>
      <a href="#">Login</a>
      <a href="#">Register</a>
    </nav>
  </header>

  <div class="main">

    <div class="sidebar">
      <h3>Categories</h3>

      <ul>
        <li>All Categories</li>
        <li>Electronics</li>
        <li>Fashion</li>
        <li>Home & Living</li>
        <li>Books</li>
        <li>Sports</li>
        <li>Vehicles</li>
      </ul>
    </div>

    <div class="content">

      <h2>All Products</h2>

      <div class="products">
      </div>
    </div>
  </div>
</div>

</body>
</html>
