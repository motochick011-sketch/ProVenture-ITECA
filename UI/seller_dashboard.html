<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard - Pro-Venture</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      padding:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:white;
      border:1px solid #ccc;
      padding:25px;
      border-radius:4px;
    }

    .seller-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
      padding-bottom:15px;
      border-bottom:1px solid #eee;
    }

    .seller-header h2{
      color:#333;
    }

    .nav-links a{
      text-decoration:none;
      margin-left:15px;
      color:#333;
      font-size:14px;
    }

    .btn{
      padding:10px 20px;
      border:none;
      border-radius:4px;
      cursor:pointer;
      font-weight:bold;
      font-size:13px;
    }

    .btn-primary{
      background:#6c63ff;
      color:white;
    }

    .btn-danger{
      background:#e74c3c;
      color:white;
    }

    .btn-warning{
      background:#f39c12;
      color:white;
    }

    .btn-back{
      background:#6c63ff;
      color:white;
      margin-bottom:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:15px;
    }

    th{
      text-align:left;
      padding:12px;
      background:#fafafa;
      border-bottom:1px solid #ddd;
      color:#555;
      font-size:13px;
    }

    td{
      padding:12px;
      border-bottom:1px solid #eee;
      font-size:14px;
      vertical-align:middle;
    }

    td img{
      width:40px;
      height:40px;
      object-fit:contain;
      vertical-align:middle;
      margin-right:8px;
    }

    .actions button{
      margin-right:5px;
    }

    /* Add/Edit Form */
    .product-form{
      display:none;
      background:#f9f9f9;
      padding:20px;
      border:1px solid #ddd;
      border-radius:4px;
      margin-bottom:20px;
    }

    .product-form.visible{
      display:block;
    }

    .product-form h3{
      margin-bottom:15px;
    }

    .form-group{
      margin-bottom:12px;
    }

    .form-group label{
      display:block;
      font-size:13px;
      margin-bottom:5px;
      color:#444;
    }

    .form-group input,
    .form-group select,
    .form-group textarea{
      width:100%;
      padding:8px;
      border:1px solid #ddd;
      border-radius:3px;
    }

    .form-actions{
      margin-top:15px;
      display:flex;
      gap:10px;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="seller-header">
    <div>
      <button class="btn btn-back" onclick="navigateTo('main_screen')">← Home</button>
      <h2 style="display:inline;margin-left:15px;">My Products</h2>
    </div>
    <div class="nav-links">
      <a href="#" onclick="navigateTo('main_screen')">Home</a>
      <a href="#" onclick="navigateTo('product_listings_screen')">Shop</a>
    </div>
  </div>

  <button class="btn btn-primary" onclick="showSellerAddForm()">+ Add New Product</button>

  <div class="product-form" id="sellerProductForm">
    <h3 id="formTitle">Add Product</h3>
    <input type="hidden" id="editProductId" value="">
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" id="spName" placeholder="Enter product name">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="spDescription" rows="3" placeholder="Enter description"></textarea>
    </div>
    <div class="form-group">
      <label>Price (R)</label>
      <input type="number" id="spPrice" placeholder="0.00" step="0.01">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="spCategory">

      </select>
    </div>
    <div class="form-group">
      <label>Image URL</label>
      <input type="text" id="spImage" placeholder="https://...">
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitSellerProduct()">Save</button>
      <button class="btn btn-warning" onclick="hideSellerForm()">Cancel</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Category</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="sellerProductsBody">
      <tr><td colspan="5" style="text-align:center;padding:20px;">Loading...</td></tr>
    </tbody>
  </table>

</div>

</body>
</html>
