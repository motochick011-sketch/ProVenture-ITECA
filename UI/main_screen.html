<!DOCTYPE html>
<html>
<head>
  <title>Pro-Venture Homepage</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:1200px;
      margin:auto;
      background:white;
      border:2px solid #5a50c8;
    }

    /* Navbar */

    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 25px;
    }

    .logo{
      color:#3525b5;
      font-size:28px;
      font-weight:bold;
    }

    .search-bar{
      display:flex;
      gap:10px;
      flex:1;
      margin:0 30px;
    }

    .search-bar select,
    .search-bar input{
      padding:10px;
      border:1px solid #ddd;
      border-radius:4px;
    }

    .search-bar input{
      flex:1;
    }

    .search-btn{
      background:white;
      border:none;
      color:#5a50c8;
      font-size:20px;
      cursor:pointer;
    }

    .nav-links a{
      text-decoration:none;
      margin-left:15px;
      color:#333;
      font-size:14px;
    }

    /* Hero Section */

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:50px 30px;
      background:#f7f6fd;
    }

    .hero-text h1{
      font-size:42px;
      color:#222;
    }

    .hero-text p{
      font-size:32px;
      margin:15px 0;
      color:#444;
    }

    .btn{
      background:#5a50c8;
      color:white;
      border:none;
      padding:12px 25px;
      border-radius:6px;
      cursor:pointer;
    }

    .hero img{
      width:450px;
    }

    /* Categories */

    .categories{
      padding:30px;
    }

    .categories h2{
      margin-bottom:20px;
    }

    .category-box{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:15px;
    }

    .card{
      background:white;
      border:1px solid #ddd;
      text-align:center;
      padding:20px;
      border-radius:8px;
    }

    .card img{
      width:55px;
      margin-bottom:10px;
    }

  </style>
</head>

<body>

<h2>Homepage</h2>

<div class="container">

  <!-- Navbar -->

  <div class="navbar">

    <div class="logo">Pro-Venture</div>

    <div class="search-bar">

      <select>
        <option>All Categories</option>
      </select>

      <input type="text" placeholder="Search for products...">

      <button class="search-btn">🔍</button>

    </div>

    <div class="nav-links">
      <a href="#">Sell</a>
      <a href="#" onclick="navigateTo('login_screen')">Login</a>
      <a href="#" onclick="navigateTo('register_screen')">Register</a>
    </div>

  </div>

  <!-- Hero Section -->

  <div class="hero">

    <div class="hero-text">

      <h1>Buy, Sell & Discover</h1>

      <p>Great items from trusted people</p>

      <button class="btn", onclick="navigateTo('product_listings_screen')">Shop Now</button>

    </div>

    <img src="https://cdn.pixabay.com/photo/2017/08/06/22/01/laptop-2591909_1280.png">

  </div>

</div>

</body>
</html>
